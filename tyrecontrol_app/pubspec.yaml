name: tyrecontrol_app
description: "Mobilink TyreControl — revision de neumaticos en campo"
publish_to: 'none'

version: 0.16.0+42

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  supabase_flutter: ^2.8.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.0

  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Sonda Bluetooth Transense TLGX (profundidad, presión, RFID)
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

# Icono de la app (SEA TyreControl). Genera todos los tamaños de Android a
# partir del logo. Ejecutar: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icono_app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#111111"
  adaptive_icon_foreground: "assets/icono_app.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_transparent.png
    - assets/icono_app.png
    - assets/logo_login.png
    - assets/logo_cabecera.png
