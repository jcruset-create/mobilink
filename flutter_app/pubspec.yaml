name: sea_tarragona_operario
description: App de operarios SEA Tarragona

publish_to: 'none'

version: 1.3.1+14

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^8.0.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.0
  signature: ^5.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo.svg
    - assets/logo_horizontal.png
    - assets/logo_transparent.png
