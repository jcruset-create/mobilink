name: Build Almacén APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/warehouse-project-status-81rr2p
    paths:
      - almacen_app/**
      - .github/workflows/build-almacen-apk.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.5
      - name: Build APK
        working-directory: almacen_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: mobilink-almacen-apk
          path: almacen_app/build/app/outputs/flutter-apk/app-release.apk
      - name: Commit APK to branch
        if: github.ref_name == 'claude/warehouse-project-status-81rr2p'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p releases
          cp almacen_app/build/app/outputs/flutter-apk/app-release.apk releases/mobilink-almacen.apk
          git add releases/mobilink-almacen.apk
          git commit -m "build: APK Mobilink Almacén (artefacto de compilación)"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
