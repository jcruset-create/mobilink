name: Build Almacén APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.32.5
      - name: Build APK
        working-directory: almacen_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: mobilink-almacen-apk
          path: almacen_app/build/app/outputs/flutter-apk/app-release.apk
